    // ============================================================
    //  2. 核心 DOM 操作与逻辑（已彻底重构修复）
    // ============================================================
    const playlistContainer = document.getElementById('playlist');
    const currentArt = document.getElementById('currentArt');
    const scPlayer = document.getElementById('scPlayer');
    const lyricsView = document.getElementById('lyricsView');
    const songArtContainer = document.getElementById('songArtView');

    let currentIndex = 0;
    let scWidget = null;
    let shouldAutoPlay = false; // 记录用户点击列表后的自动播放意图

    function initPlaylist() {
        soundtracksData.forEach((track, index) => {
            const item = document.createElement('div');
            item.className = `track-item ${index === 0 ? 'active' : ''}`;
            item.setAttribute('data-index', index);
            item.addEventListener('click', () => selectTrack(index));
            item.innerHTML = `
                <span class="track-meta">${track.chapter}</span>
                <span class="track-title">${track.title}</span>
            `;
            playlistContainer.appendChild(item);
        });
        loadTrack(0);
    }

    function selectTrack(index) {
        if (index === currentIndex) return;
        const items = document.querySelectorAll('.track-item');
        items.forEach((el, i) => el.classList.toggle('active', i === index));
        
        // UI 淡出淡入效果
        songArtContainer.style.transition = 'opacity 0.28s';
        lyricsView.style.transition = 'opacity 0.28s';
        songArtContainer.style.opacity = '0';
        lyricsView.style.opacity = '0';
        
        shouldAutoPlay = true; // 标记：用户主动点击了，加载完后请自动播放
        
        setTimeout(() => {
            loadTrack(index);
            songArtContainer.style.opacity = '1';
            lyricsView.style.opacity = '1';
        }, 280);
        currentIndex = index;
    }

    function loadTrack(index) {
        const track = soundtracksData[index];
        if (!track) return;
        
        // 1. 更新封面与歌词
        currentArt.src = track.art;
        currentArt.alt = track.title;
        let formatted = track.lyrics.replace(/(\[.*?\])/g, '<span class="verse-tag">$1</span>');
        lyricsView.innerHTML = formatted;
        lyricsView.scrollTop = 0;
        
        // 2. 核心修复：重置播放器状态
        scPlayer.onload = null; // 清除旧的 onload 监听，防止重复触发
        scWidget = null;        // 废弃旧的 Widget 实例（不要调用不存在的 unbind）
        
        // 3. 赋予新的 SoundCloud 链接
        scPlayer.src = track.scLink;
        
        // 4. 终极修复：必须等待 iframe 彻底加载完毕 (onload)，才能绑定 API
        scPlayer.onload = function() {
            // 给 iframe 内部的 SoundCloud 脚本预留 500ms 的执行时间
            setTimeout(bindWidget, 500); 
        };
    }

    function bindWidget() {
        // 防御性检查：确保 SC API 已就绪
        if (!window.SC || !SC.Widget) {
            console.warn('⚠️ SoundCloud API 尚未加载完成');
            return;
        }
        
        try {
            scWidget = SC.Widget(scPlayer);
            
            scWidget.bind(SC.Widget.Events.READY, () => {
                console.log('✅ 播放器就绪：', soundtracksData[currentIndex].title);
                // 如果用户刚才点击了列表，这里自动触发播放
                if (shouldAutoPlay) {
                    try {
                        scWidget.play();
                    } catch(e) {
                        console.warn('⚠️ 自动播放被浏览器策略拦截，请手动点击播放器');
                    }
                    shouldAutoPlay = false;
                }
            });
            
            scWidget.bind(SC.Widget.Events.PLAY, () => console.log('▶️ 播放中'));
            scWidget.bind(SC.Widget.Events.ERROR, (e) => console.error('❌ 播放错误:', e));
        } catch (e) {
            console.warn('Widget 绑定失败:', e);
        }
    }

    // 辅助手势触发（应对 Safari/Chrome 严格的跨域 iframe 自动播放拦截）
    document.addEventListener('click', function(e) {
        if (shouldAutoPlay && scWidget) {
            try {
                scWidget.play();
                shouldAutoPlay = false;
                console.log('🎯 用户手势触发播放成功');
            } catch(err) {}
        }
    });

    // 确保 DOM 和 SC API 都准备好后再初始化
    window.addEventListener('DOMContentLoaded', () => {
        if (typeof SC !== 'undefined') {
            initPlaylist();
        } else {
            // 轮询等待 api.js 下载完毕
            const checkSC = setInterval(() => {
                if (typeof SC !== 'undefined') {
                    clearInterval(checkSC);
                    initPlaylist();
                }
            }, 100);
        }
    });
</script>
